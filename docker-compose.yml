services:
  hermes-wrapper:
    build: ./wrapper
    container_name: hermes-wrapper
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount hermes binary and its venv from host
      - /usr/local/lib/hermes-agent:/usr/local/lib/hermes-agent:ro
      - /usr/local/bin/hermes:/usr/local/bin/hermes:ro
      # Hermes config
      - ~/.hermes:/root/.hermes:ro
