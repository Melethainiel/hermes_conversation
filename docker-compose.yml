services:
  hermes-wrapper:
    build: ./wrapper
    container_name: hermes-wrapper
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Set your LLM API key(s) here
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Home Assistant connection (for Hermes HA tools)
      - HASS_URL=${HASS_URL:-}
      - HASS_TOKEN=${HASS_TOKEN:-}
    volumes:
      # Hermes config (memory, personality, skills, etc.)
      - ~/.hermes:/root/.hermes
