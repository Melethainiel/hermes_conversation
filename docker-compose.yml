services:
  hermes-wrapper:
    build: ./wrapper
    container_name: hermes-wrapper
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount Hermes source + venv (includes all dependencies)
      - ~/.hermes/hermes-agent:/opt/hermes-agent:ro
      # Mount Hermes config (API keys, memory, etc.)
      - ~/.hermes:/root/.hermes:ro
