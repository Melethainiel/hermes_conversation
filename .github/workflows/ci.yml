name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -c "
          import json, sys
          m = json.load(open('custom_components/hermes_conversation/manifest.json'))
          required = ['domain', 'name', 'version', 'documentation', 'dependencies', 'config_flow']
          missing = [k for k in required if k not in m]
          if missing:
              print(f'Missing keys: {missing}')
              sys.exit(1)
          print('Manifest OK')
          "
